<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile | Intelligence Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #010101; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; border-radius: 12px; }
        .neon-text { color: #6366f1; text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="p-8">
    <nav class="mb-12">
        <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-neutral-500 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Matrix
        </a>
    </nav>

    <div id="profileContainer" class="max-w-5xl mx-auto opacity-0 transition-opacity duration-500">
        <header class="mb-12 border-b border-neutral-900 pb-8">
            <p class="text-indigo-500 font-black text-[10px] uppercase tracking-[0.5em] mb-2">Personnel Profile</p>
            <h1 id="docName" class="text-5xl font-black uppercase tracking-tighter text-white">Loading...</h1>
            <div id="docDept" class="mt-4 inline-block px-3 py-1 bg-indigo-900/30 border border-indigo-500/50 rounded text-indigo-400 text-[10px] font-bold uppercase tracking-widest">
                Department
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="glass-panel p-6">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Total Lifetime Revenue</p>
                <h3 id="totalRev" class="text-3xl font-black neon-text">₱0</h3>
            </div>
            <div class="glass-panel p-6">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Patient Volume</p>
                <h3 id="patientCount" class="text-3xl font-black text-white">0</h3>
            </div>
            <div class="glass-panel p-6">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Primary Payor</p>
                <h3 id="topPayor" class="text-3xl font-black text-white">-</h3>
            </div>
        </div>

        <div class="glass-panel overflow-hidden">
            <div class="p-4 border-b border-neutral-900 bg-neutral-900/20">
                <h4 class="text-[10px] font-black uppercase tracking-widest">Transaction Logs</h4>
            </div>
            <table class="w-full text-left text-sm">
                <thead class="text-[9px] uppercase text-neutral-500 border-b border-neutral-900">
                    <tr>
                        <th class="p-4">Month</th>
                        <th class="p-4">Patient Type</th>
                        <th class="p-4">Payor Class</th>
                        <th class="p-4 text-right">Revenue</th>
                    </tr>
                </thead>
                <tbody id="logTable" class="text-neutral-300">
                    <!-- Data Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gqlmaxlabfdvansqjufd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxbG1heGxhYmZkdmFuc3FqdWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDgxODAsImV4cCI6MjA5MzAyNDE4MH0.IdiyhRSxoEGguocFAJJyfugyFfLUvQ_IR58-8gSH48U';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');

            if (!name) {
                document.body.innerHTML = "<div class='text-center py-20 font-black uppercase tracking-widest'>Error: No Doctor Selected</div>";
                return;
            }

            // Fetch all records for this specific doctor
            const { data, error } = await sb
                .from('doctors')
                .select('*')
                .eq('doctor', name);

            if (error || !data.length) {
                document.getElementById('docName').innerText = "Data Not Found";
                return;
            }

            // Calculations
            const totalRev = data.reduce((sum, row) => sum + (parseFloat(row.revenue) || 0), 0);
            const payors = data.map(d => d.type);
            const topPayor = payors.sort((a,b) => payors.filter(v => v===a).length - payors.filter(v => v===b).length).pop();

            // UI Binding
            document.getElementById('docName').innerText = name;
            document.getElementById('docDept').innerText = data[0].department || 'General';
            document.getElementById('totalRev').innerText = `₱${Math.round(totalRev).toLocaleString()}`;
            document.getElementById('patientCount').innerText = data.length.toLocaleString();
            document.getElementById('topPayor').innerText = topPayor;

            const tableBody = document.getElementById('logTable');
            tableBody.innerHTML = data.map(row => `
                <tr class="border-b border-neutral-900/50 hover:bg-white/5 transition-colors">
                    <td class="p-4 font-bold text-indigo-400">${row.month}</td>
                    <td class="p-4 text-[10px] uppercase font-black">${row.patient_type}</td>
                    <td class="p-4 text-[10px] uppercase font-black text-neutral-500">${row.type}</td>
                    <td class="p-4 text-right font-mono">₱${Math.round(row.revenue).toLocaleString()}</td>
                </tr>
            `).join('');

            document.getElementById('profileContainer').classList.remove('opacity-0');
        }

        loadProfile();
    </script>
</body>
</html>
