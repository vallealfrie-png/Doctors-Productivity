<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile | Neural Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Highcharts Core and Modules -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/variable-pie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #010101; color: #e5e5e5; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; border-radius: 12px; }
        .neon-text { color: #6366f1; text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
        .chart-container { width: 100%; height: 300px; }
    </style>
</head>
<body class="p-8">
    <nav class="mb-12">
        <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-neutral-500 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Matrix
        </a>
    </nav>

    <div id="profileContainer" class="max-w-6xl mx-auto opacity-0 transition-opacity duration-700">
        <!-- Header Section -->
        <header class="mb-10 border-b border-neutral-900 pb-8 flex justify-between items-end">
            <div>
                <p class="text-indigo-500 font-black text-[10px] uppercase tracking-[0.5em] mb-2">Personnel Profile</p>
                <h1 id="docName" class="text-5xl font-black uppercase tracking-tighter text-white">Loading...</h1>
                <div id="docDept" class="mt-4 inline-block px-3 py-1 bg-indigo-900/30 border border-indigo-500/50 rounded text-indigo-400 text-[10px] font-bold uppercase tracking-widest">
                    Department
                </div>
            </div>
            <div class="text-right">
                <p class="text-neutral-600 text-[9px] font-black uppercase tracking-widest">System Status</p>
                <p class="text-emerald-500 text-[10px] font-bold uppercase tracking-widest"><i class="fa-solid fa-circle text-[6px] mr-2 animate-pulse"></i>Node Active</p>
            </div>
        </header>

        <!-- Scorecards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 border-l-4 border-l-indigo-600">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Cumulative Revenue</p>
                <h3 id="totalRev" class="text-4xl font-black neon-text">₱0</h3>
            </div>
            <div class="glass-panel p-6 border-l-4 border-l-emerald-600">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Total Patient Visits</p>
                <h3 id="patientCount" class="text-4xl font-black text-white">0</h3>
            </div>
            <div class="glass-panel p-6 border-l-4 border-l-rose-600">
                <p class="text-neutral-500 text-[9px] font-black uppercase tracking-widest mb-1">Primary Payor</p>
                <h3 id="topPayor" class="text-4xl font-black text-white">-</h3>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Monthly Performance -->
            <div class="glass-panel p-6">
                <div id="monthlyChart" class="chart-container"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Patient Type -->
                <div class="glass-panel p-4">
                    <div id="patientTypeChart" class="chart-container"></div>
                </div>
                <!-- Payor Mix -->
                <div class="glass-panel p-4">
                    <div id="payorMixChart" class="chart-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gqlmaxlabfdvansqjufd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxbG1heGxhYmZkdmFuc3FqdWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDgxODAsImV4cCI6MjA5MzAyNDE4MH0.IdiyhRSxoEGguocFAJJyfugyFfLUvQ_IR58-8gSH48U';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Global Highcharts Dark Theme
        Highcharts.setOptions({
            chart: { backgroundColor: 'transparent', style: { fontFamily: 'Inter' } },
            title: { style: { color: '#555', fontSize: '10px', fontWeight: '900', textTransform: 'uppercase' } },
            credits: { enabled: false },
            tooltip: { backgroundColor: '#000', style: { color: '#fff' }, borderWidth: 1, borderColor: '#333' }
        });

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            if (!name) return;

            const { data, error } = await sb.from('doctors').select('*').eq('doctor', name);
            if (error || !data.length) return;

            // Calculations
            const totalRev = data.reduce((sum, row) => sum + (parseFloat(row.revenue) || 0), 0);
            
            const monthlyData = {};
            data.forEach(r => { monthlyData[r.month] = (monthlyData[r.month] || 0) + parseFloat(r.revenue); });

            const ptTypes = { 'Inpatient': 0, 'Outpatient': 0, 'Emergency': 0 };
            data.forEach(r => { if(ptTypes.hasOwnProperty(r.patient_type)) ptTypes[r.patient_type]++; });

            const payorMix = {};
            data.forEach(r => { payorMix[r.type] = (payorMix[r.type] || 0) + 1; });
            const topPayorName = Object.keys(payorMix).reduce((a, b) => payorMix[a] > payorMix[b] ? a : b);

            // Update UI
            document.getElementById('docName').innerText = name;
            document.getElementById('docDept').innerText = data[0].department || 'General';
            document.getElementById('totalRev').innerText = `₱${Math.round(totalRev).toLocaleString()}`;
            document.getElementById('patientCount').innerText = data.length.toLocaleString();
            document.getElementById('topPayor').innerText = topPayorName;

            renderHighcharts(monthlyData, ptTypes, payorMix);
            document.getElementById('profileContainer').classList.remove('opacity-0');
        }

        function renderHighcharts(monthly, patients, payors) {
            // Monthly Bar
            Highcharts.chart('monthlyChart', {
                chart: { type: 'column' },
                title: { text: 'Monthly Revenue Performance', align: 'left' },
                xAxis: { categories: Object.keys(monthly), labels: { style: { color: '#888' } } },
                yAxis: { title: { text: null }, gridLineColor: '#1a1a1a', labels: { style: { color: '#444' } } },
                series: [{
                    name: 'Revenue',
                    data: Object.values(monthly),
                    color: '#6366f1',
                    borderRadius: 5
                }],
                legend: { enabled: false }
            });

            // Patient Type Pie
            Highcharts.chart('patientTypeChart', {
                chart: { type: 'pie' },
                title: { text: 'Patient Distribution' },
                plotOptions: { pie: { borderWidth: 0, dataLabels: { enabled: false }, showInLegend: true } },
                series: [{
                    name: 'Visits',
                    colorByPoint: true,
                    data: Object.entries(patients).map(([name, y]) => ({ name, y })),
                    colors: ['#6366f1', '#10b981', '#f43f5e']
                }],
                legend: { itemStyle: { color: '#888', fontSize: '9px' } }
            });

            // Payor Mix Doughnut
            Highcharts.chart('payorMixChart', {
                chart: { type: 'pie' },
                title: { text: 'Payor Mix' },
                plotOptions: { pie: { innerSize: '70%', borderWidth: 0, dataLabels: { enabled: false }, showInLegend: true } },
                series: [{
                    name: 'Count',
                    colorByPoint: true,
                    data: Object.entries(payors).map(([name, y]) => ({ name, y })),
                    colors: ['#8b5cf6', '#f59e0b', '#3b82f6', '#ec4899']
                }],
                legend: { itemStyle: { color: '#888', fontSize: '9px' } }
            });
        }

        loadProfile();
    </script>
</body>
</html>
