<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Intelligence - Doctor Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @property --bg-angle { inherits: false; initial-value: 0deg; syntax: "<angle>"; }
        @keyframes spin { to { --bg-angle: 360deg; } }
        
        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(99, 102, 241, 0.4); opacity: 0.8; }
            50% { text-shadow: 0 0 25px rgba(99, 102, 241, 1), 0 0 40px rgba(99, 102, 241, 0.6); opacity: 1; }
        }

        body { background-color: #010101; color: #e5e5e5; display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #sidebar { width: 220px; border-right: 1px solid #1a1a1a; background: #050505; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;}
        #deptList { flex-grow: 1; overflow-y: auto; scrollbar-width: none; padding: 12px; }
        
        .dept-btn {
            width: 100%; padding: 10px; margin-bottom: 6px; background: #0a0a0a;
            border: 1px solid #1a1a1a; border-radius: 6px; color: #555;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            text-align: left; letter-spacing: 1px; transition: all 0.3s ease;
        }
        .dept-btn:hover { color: #888; border-color: #333; }
        .dept-btn.active { color: #fff; border-color: #6366f1; background: #0c0c1e; border-left: 3px solid #6366f1; }

        .home-btn {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px;
            background: rgba(99, 102, 241, 0.1); border-bottom: 1px solid #1a1a1a;
            color: #6366f1; font-size: 9px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.3s;
        }

        .neon-card { border: 2px solid transparent; border-radius: 12px; animation: spin 4s infinite linear; position: relative; }
        .card-indigo { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #6366f1, #1e1b4b, #6366f1) border-box; }
        .card-emerald { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #10b981, #064e3b, #10b981) border-box; }
        .card-rose { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #f43f5e, #4c0519, #f43f5e) border-box; }
        .card-amber { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #f59e0b, #451a03, #f59e0b) border-box; }

        .pulsing-label { animation: neonPulse 2s infinite ease-in-out; }

        main { flex: 1; overflow-y: auto; padding: 30px; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar-bg { width: 280px; height: 2px; background: #111; overflow: hidden; margin-top: 20px; }
        #progressBar { height: 100%; width: 0%; background: #6366f1; box-shadow: 0 0 15px #6366f1; transition: width 0.3s ease; }

        .neon-select {
            width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 6px; color: #6366f1; font-size: 10px; font-weight: 900;
            padding: 8px; text-transform: uppercase; outline: none; cursor: pointer;
            appearance: none; transition: border-color 0.3s;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h1 id="loaderTitle" class="text-[10px] font-black uppercase tracking-[0.5em] text-indigo-500 animate-pulse">Initializing Data Stream</h1>
        <div class="progress-bar-bg"><div id="progressBar"></div></div>
    </div>

    <aside id="sidebar">
        <div class="home-btn"><i class="fa-solid fa-microchip"></i><span>Analytics Hub</span></div>

        <div class="p-4 border-b border-neutral-900">
             <h2 class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-1">Status:</h2>
             <p class="text-[10px] font-bold text-indigo-500 uppercase">Live Database Access</p>
        </div>
        
        <div class="p-3 border-b border-neutral-900">
            <h2 class="text-[8px] font-black text-neutral-500 uppercase tracking-widest mb-2">Revenue Month:</h2>
            <select id="monthFilter" onchange="handleFilterUpdate()" class="neon-select">
                <option value="all">Full Fiscal Year</option>
            </select>
        </div>

        <div id="deptList">
            <button onclick="handleDeptChange('all', this)" class="dept-btn active">Total Grid</button>
        </div>
    </aside>

    <main>
        <header class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase text-white tracking-tighter">
                    Doctor Revenue <span class="text-indigo-500">Intelligence</span>
                </h1>
                <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-[0.4em] mt-1">
                    Excluding Emergency Department
                </p>
            </div>
            <div class="text-right">
                <p id="activeDeptLabel" class="text-2xl font-black uppercase tracking-tighter text-indigo-500 pulsing-label">GLOBAL VIEW</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="neon-card card-indigo p-8">
                <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Active Doctors</p>
                <h2 id="totalDoctors" class="text-7xl font-black text-white tracking-tighter">0</h2>
            </div>
            <div class="neon-card card-emerald p-8 lg:col-span-2">
                <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-4">Bracket Distribution (Excl. Emergency)</p>
                <div id="tierStats" class="flex flex-wrap gap-x-12 gap-y-6 text-white"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-12">
            <div class="neon-card card-rose p-6 h-[400px]"><canvas id="revenueChart"></canvas></div>
            <div class="neon-card card-amber p-6 h-[400px] overflow-y-auto">
                <p class="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-4">Top Revenue Registry</p>
                <div id="leaderboard" class="space-y-2 text-xs"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://gqlmaxlabfdvansqjufd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxbG1heGxhYmZkdmFuc3FqdWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDgxODAsImV4cCI6MjA5MzAyNDE4MH0.IdiyhRSxoEGguocFAJJyfugyFfLUvQ_IR58-8gSH48U';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let masterData = []; 
        let doctorTotals = []; 
        let currentDept = 'all';

        async function init() {
            let allRows = [];
            let rangeStart = 0;
            const pageSize = 1000;
            const progressBar = document.getElementById('progressBar');
            const loaderTitle = document.getElementById('loaderTitle');

            try {
                // RECURSIVE FETCHING (All Rows)
                while (true) {
                    const { data, error, count } = await sb
                        .from('doctors')
                        .select('*', { count: 'exact' })
                        .range(rangeStart, rangeStart + pageSize - 1);

                    if (error) throw error;
                    if (!data || data.length === 0) break;

                    allRows = [...allRows, ...data];
                    
                    if (count) {
                        const perc = (allRows.length / count) * 100;
                        progressBar.style.width = `${perc}%`;
                        loaderTitle.innerText = `SYNCING CORE: ${allRows.length} / ${count}`;
                    }

                    if (data.length < pageSize) break;
                    rangeStart += pageSize;
                }

                masterData = allRows;
                setupFilters();
                
                document.getElementById('loader').style.display = 'none';
                render();

            } catch (err) {
                loaderTitle.innerText = "LINK FAILURE: " + err.message;
                loaderTitle.style.color = "#f43f5e";
            }
        }

        function setupFilters() {
            // Setup Departments (Excluding Emergency from the list too)
            const depts = [...new Set(masterData.map(d => d.department))]
                          .filter(d => d && d !== 'Emergency')
                          .sort();
            
            const list = document.getElementById('deptList');
            depts.forEach(d => {
                const btn = document.createElement('button');
                btn.className = 'dept-btn';
                btn.textContent = d;
                btn.onclick = () => handleDeptChange(d, btn);
                list.appendChild(btn);
            });

            // Setup Months
            const months = [...new Set(masterData.map(d => d.month))].filter(Boolean);
            const monthSelect = document.getElementById('monthFilter');
            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                monthSelect.appendChild(opt);
            });
        }

        function handleDeptChange(dept, el) {
            currentDept = dept;
            document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function handleFilterUpdate() { render(); }

        function render() {
            const selectedMonth = document.getElementById('monthFilter').value;
            
            // 1. FILTERING (MANDATORY EXCLUSION OF EMERGENCY)
            let filtered = masterData.filter(d => d.department !== 'Emergency');

            if (currentDept !== 'all') filtered = filtered.filter(d => d.department === currentDept);
            if (selectedMonth !== 'all') filtered = filtered.filter(d => d.month === selectedMonth);

            // 2. AGGREGATE BY DOCTOR
            const agg = {};
            filtered.forEach(r => {
                const rev = parseFloat(r.revenue) || 0;
                agg[r.doctor] = (agg[r.doctor] || 0) + rev;
            });

            doctorTotals = Object.keys(agg).map(name => ({
                name,
                revenue: agg[name]
            })).sort((a, b) => b.revenue - a.revenue);

            // 3. DEFINE BRACKETS
            const brackets = [
                { label: 'Elite (>10M)', min: 10000000, max: Infinity, count: 0 },
                { label: 'High (5M-10M)', min: 5000000, max: 10000000, count: 0 },
                { label: 'Mid (2M-5M)', min: 2000000, max: 5000000, count: 0 },
                { label: 'Growth (1M-2M)', min: 1000000, max: 2000000, count: 0 },
                { label: 'Standard (<1M)', min: -Infinity, max: 1000000, count: 0 }
            ];

            doctorTotals.forEach(doc => {
                const b = brackets.find(b => doc.revenue > b.min && doc.revenue <= b.max);
                if (b) b.count++;
            });

            // 4. UI UPDATES
            document.getElementById('activeDeptLabel').innerText = 
                currentDept === 'all' ? "GLOBAL VIEW (EXCL. EMER)" : currentDept.toUpperCase();
            
            document.getElementById('totalDoctors').innerText = doctorTotals.length.toLocaleString();

            const tierContainer = document.getElementById('tierStats');
            tierContainer.innerHTML = brackets.map(b => `
                <div>
                    <p class="text-[9px] font-black text-neutral-500 uppercase tracking-widest">${b.label}</p>
                    <p class="text-3xl font-black">${b.count}</p>
                </div>
            `).join('');

            updateVisuals();
        }

        let mainChart;
        function updateVisuals() {
            // Leaderboard
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = doctorTotals.slice(0, 15).map(d => `
                <div class="flex justify-between border-b border-neutral-900 pb-1">
                    <span class="text-neutral-300 font-bold uppercase truncate pr-4">${d.name}</span>
                    <span class="text-indigo-400 font-black">₱${Math.round(d.revenue).toLocaleString()}</span>
                </div>
            `).join('');

            // Bar Chart (Top 10)
            const top10 = doctorTotals.slice(0, 10);
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(document.getElementById('revenueChart'), {
                type: 'bar',
                data: {
                    labels: top10.map(d => d.name.split(',')[0]),
                    datasets: [{
                        label: 'REVENUE',
                        data: top10.map(d => d.revenue),
                        backgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#111' }, ticks: { color: '#444' } },
                        x: { grid: { display: false }, ticks: { color: '#888', font: { size: 9, weight: 'bold' } } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
